<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOLOv8 Person Heatmap</title>
    <!-- Geist Design System: Fonts (Vercel) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/latin.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.3/latin-400.css"
    />
    <style>
      /* --- Geist Design System tokens (light theme) --- */
      :root {
        /* Backgrounds */
        --geist-bg-1: #ffffff;
        --geist-bg-2: #fafafa;
        /* Component backgrounds */
        --geist-bg-component-1: #fafafa;
        --geist-bg-component-2: #f5f5f5;
        --geist-bg-component-3: #e5e5e5;
        /* Borders */
        --geist-border: #e5e5e5;
        --geist-border-hover: #d4d4d4;
        --geist-border-active: #a3a3a3;
        /* High contrast (buttons, etc.) */
        --geist-high-contrast: #0a0a0a;
        --geist-high-contrast-hover: #262626;
        /* Text */
        --geist-text-primary: #0a0a0a;
        --geist-text-secondary: #737373;
        /* Semantic */
        --geist-success: #22c55e;
        --geist-success-foreground: #ffffff;
        --geist-danger: #ef4444;
        --geist-danger-foreground: #ffffff;
        --geist-accent: #3b82f6;
        /* Typography (Geist) */
        --font-sans: "Geist Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "Geist Mono", ui-monospace, monospace;
        /* Spacing (4px grid) */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --radius: 8px;
        --radius-lg: 12px;
        --focus-ring: 0 0 0 2px var(--geist-bg-1), 0 0 0 4px var(--geist-accent);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        color: var(--geist-text-primary);
        background: var(--geist-bg-1);
        -webkit-font-smoothing: antialiased;
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: var(--space-8) var(--space-4) var(--space-8);
      }

      /* Typography — Geist scale */
      h1 {
        margin: 0 0 var(--space-2);
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .hint {
        color: var(--geist-text-secondary);
        font-size: 0.875rem;
        margin: 0 0 var(--space-6);
      }

      /* Cards / Panels */
      .card {
        margin-top: var(--space-4);
        padding: var(--space-5);
        background: var(--geist-bg-component-1);
        border: 1px solid var(--geist-border);
        border-radius: var(--radius-lg);
      }

      .card-title {
        margin: 0 0 var(--space-2);
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--geist-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* Controls */
      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: var(--space-4);
      }

      .field {
        display: grid;
        gap: var(--space-1);
      }

      .field label {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--geist-text-secondary);
      }

      .field input {
        width: 120px;
        height: 40px;
        padding: 0 var(--space-3);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        color: var(--geist-text-primary);
        background: var(--geist-bg-1);
        border: 1px solid var(--geist-border);
        border-radius: var(--radius);
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .field input:hover {
        border-color: var(--geist-border-hover);
      }

      .field input:focus {
        outline: none;
        border-color: var(--geist-accent);
        box-shadow: var(--focus-ring);
      }

      .field input::placeholder {
        color: var(--geist-text-secondary);
      }

      /* Buttons — Geist style */
      button {
        font-family: var(--font-sans);
        font-size: 0.875rem;
        font-weight: 500;
        height: 40px;
        padding: 0 var(--space-4);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
      }

      button:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--geist-high-contrast);
        color: var(--geist-bg-1);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--geist-high-contrast-hover);
      }

      .btn-success {
        background: var(--geist-success);
        color: var(--geist-success-foreground);
      }

      .btn-success:hover:not(:disabled) {
        filter: brightness(1.05);
      }

      .btn-danger {
        background: var(--geist-danger);
        color: var(--geist-danger-foreground);
      }

      .btn-danger:hover:not(:disabled) {
        filter: brightness(1.08);
      }

      /* Video / Canvas area */
      #videoWrap,
      .heatmapFrame {
        position: relative;
        margin-top: var(--space-4);
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: #000;
        border: 1px solid var(--geist-border);
      }

      video,
      canvas,
      img {
        width: 100%;
        display: block;
        vertical-align: middle;
      }

      #overlay {
        position: absolute;
        left: 0;
        top: 0;
      }

      /* Status */
      #status {
        margin: var(--space-3) 0 0;
        font-size: 0.875rem;
        color: var(--geist-text-secondary);
      }

      /* Stats grid — Geist layout */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: var(--space-4);
      }

      .stat {
        padding: var(--space-3) 0;
      }

      .statLabel {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--geist-text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .statValue {
        margin-top: var(--space-1);
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--geist-text-primary);
      }

      /* Status badge (Geist Pill style) */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        padding: var(--space-1) var(--space-2);
        font-size: 0.75rem;
        font-weight: 500;
        border-radius: 9999px;
      }

      .badge-neutral {
        background: var(--geist-bg-component-2);
        color: var(--geist-text-secondary);
      }

      .badge-success {
        background: rgba(34, 197, 94, 0.15);
        color: var(--geist-success);
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }

      .badge-success .badge-dot {
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Heatmap panel */
      .heatmapPanel p {
        margin: 0 0 var(--space-4);
        font-size: 0.875rem;
        color: var(--geist-text-secondary);
      }

      .historyList {
        display: grid;
        gap: var(--space-4);
      }

      .historyItem {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: var(--space-4);
        padding: var(--space-3);
        border: 1px solid var(--geist-border);
        border-radius: var(--radius);
        background: var(--geist-bg-1);
      }

      .historyThumb {
        width: 100%;
        border-radius: var(--radius);
        border: 1px solid var(--geist-border);
        background: var(--geist-bg-2);
      }

      .historyMeta {
        display: grid;
        gap: var(--space-1);
        min-width: 0;
      }

      .historyTitle {
        font-weight: 600;
      }

      .historyText {
        color: var(--geist-text-secondary);
        word-break: break-all;
      }

      .historyEmpty {
        color: var(--geist-text-secondary);
        font-size: 0.875rem;
      }

      @media (max-width: 640px) {
        .historyItem {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>YOLOv8 Person Heatmap PoC</h1>
      <p class="hint">
        固定したスマホカメラから人物のみを検出し、足元位置を床面へ推定投影して、部屋平面の長方形ヒートマップを作成します。
        `カメラ起動` -> `部屋の構造推定` -> `計測開始` の順で操作してください。
      </p>

      <section class="card" aria-labelledby="controls-heading">
        <h2 id="controls-heading" class="card-title">計測設定</h2>
        <div class="controls">
          <div class="field">
            <label for="durationInput">計測時間（分）</label>
            <input
              id="durationInput"
              type="number"
              min="1"
              max="1440"
              value="60"
            />
          </div>
          <div class="field">
            <label for="intervalInput">送信間隔（ms）</label>
            <input
              id="intervalInput"
              type="number"
              min="200"
              max="5000"
              value="1000"
            />
          </div>
          <div class="field">
            <label for="roomWidthInput">部屋幅（任意単位）</label>
            <input id="roomWidthInput" type="number" min="1" step="0.5" value="10" />
          </div>
          <div class="field">
            <label for="roomHeightInput">部屋奥行（任意単位）</label>
            <input id="roomHeightInput" type="number" min="1" step="0.5" value="10" />
          </div>
          <div class="field">
            <label for="floorTopInput">床開始Y比率</label>
            <input id="floorTopInput" type="number" min="0.05" max="0.95" step="0.01" value="0.35" />
          </div>
          <div class="field">
            <label for="topWidthInput">奥側の見かけ幅</label>
            <input id="topWidthInput" type="number" min="0.05" max="1" step="0.01" value="0.38" />
          </div>
          <div class="field">
            <label for="bottomWidthInput">手前の見かけ幅</label>
            <input id="bottomWidthInput" type="number" min="0.05" max="1" step="0.01" value="1.0" />
          </div>
          <button id="cameraBtn" class="btn-primary" type="button">カメラ起動</button>
          <button id="estimateBtn" class="btn-primary" type="button" disabled>部屋の構造推定</button>
          <button id="startBtn" class="btn-success" type="button" disabled>計測開始</button>
          <button id="stopBtn" class="btn-danger" type="button" disabled>計測停止</button>
        </div>
      </section>

      <section class="card" aria-label="カメラ映像">
        <div id="videoWrap">
          <video id="video" playsinline autoplay muted aria-label="カメラ映像"></video>
          <canvas id="overlay" aria-hidden="true"></canvas>
        </div>
      </section>

      <section class="card" aria-labelledby="stats-heading">
        <h2 id="stats-heading" class="card-title">計測状況</h2>
        <div class="stats">
          <div class="stat">
            <div class="statLabel">状態</div>
            <div class="statValue" id="stateValue">
              <span id="stateBadge" class="badge badge-neutral"><span class="badge-dot"></span> 待機中</span>
            </div>
          </div>
          <div class="stat">
            <div class="statLabel">経過時間</div>
            <div class="statValue" id="elapsedValue">00:00</div>
          </div>
          <div class="stat">
            <div class="statLabel">残り時間</div>
            <div class="statValue" id="remainingValue">--:--</div>
          </div>
          <div class="stat">
            <div class="statLabel">処理フレーム数</div>
            <div class="statValue" id="framesValue">0</div>
          </div>
          <div class="stat">
            <div class="statLabel">現在の検出人数</div>
            <div class="statValue" id="peopleValue">0</div>
          </div>
        </div>
        <p id="status">未開始</p>
      </section>

      <section class="card heatmapPanel" aria-labelledby="heatmap-heading">
        <h2 id="heatmap-heading" class="card-title">ヒートマップ</h2>
        <p>
          カメラ画像ではなく、部屋平面を長方形で表した占有ヒートマップです。上側が奥、下側がカメラ手前です。
        </p>
        <div class="heatmapFrame">
          <img id="heatmapImage" alt="人物ヒートマップ" />
        </div>
      </section>

      <section class="card" aria-labelledby="history-heading">
        <h2 id="history-heading" class="card-title">ローカル履歴</h2>
        <div id="historyList" class="historyList"></div>
      </section>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
